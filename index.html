<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Ubicacion geografica</title>
    </head>

    <body>
        <div class="tarjeta">
            
            <div class="Satelite"> 📡</div>
            <h2 id="texto">Enlace Satelital </h2>
            <h4 id="coordenadas"></h4>
            <button id="ActivarRastreo"> Activar Rastreo</button>

        </div>
    </body>

    <script>
            document.getElementById('ActivarRastreo').addEventListener('click', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        // Éxito:
                        (position) => {
                            document.getElementById('coordenadas').innerText = 
                                "¡Conexión establecida!";
                            document.getElementById('coordenadas').innerText =     
                                `Lat: ${position.coords.latitude}, Lon: ${position.coords.longitude}`;
                        },
                        // Error/Denegación:
                        (error) => {
                            document.getElementById('coordenadas').innerText = 
                                "Permiso denegado o ubicación no disponible.";
                            console.error(error);
                        }
                    );
                } else {
                    alert("La geolocalización no es soportada por tu navegador.");
                }
            });
            
            //document.getElementById("coordenadas").innerHTML="Tus coordenadas son: ";
